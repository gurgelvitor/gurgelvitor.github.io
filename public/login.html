<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GurgelTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #fff5f5;
            --bg-secondary: #ffffff;
            --accent: #dc143c;
            --accent-hover: #b91c1c;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border: #ffcccc;
            --shadow: 0 4px 12px rgba(220, 20, 60, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1e1e1e;
            --accent: #e91e63;
            --accent-hover: #f06292;
            --text-primary: #f5f5f5;
            --text-secondary: #b8b8b8;
            --border: #333333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.6;
        }

        .login-container {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
        }

        /* Layout Responsivo */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .login-container {
                padding: 2rem;
                max-width: 100%;
                margin: 0 1rem;
            }
            
            .login-logo {
                width: 100px;
                height: 100px;
                margin: 0 auto 1rem;
            }
            
            .login-title {
                font-size: 1.75rem;
            }
            
            .login-subtitle {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
            
            .login-container {
                padding: 1.5rem;
                margin: 0 0.5rem;
                border-radius: 15px;
            }
            
            .login-logo {
                width: 80px;
                height: 80px;
                margin: 0 auto 1rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
            
            .login-subtitle {
                font-size: 0.85rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
            
            .form-input {
                padding: 0.75rem;
                font-size: 0.9rem;
            }
            
            .login-btn {
                padding: 0.75rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 1rem;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            .login-logo {
                width: 70px;
                height: 70px;
            }
            
            .login-title {
                font-size: 1.25rem;
            }
            
            .login-subtitle {
                font-size: 0.8rem;
            }
        }

        /* Tablets e telas médias */
        @media (min-width: 769px) and (max-width: 1024px) {
            .login-container {
                max-width: 500px;
                padding: 2.5rem;
            }
            
            .login-logo {
                width: 110px;
                height: 110px;
            }
        }

        /* Telas grandes */
        @media (min-width: 1025px) {
            .login-container {
                max-width: 450px;
                padding: 3rem;
            }
            
            .login-logo {
                width: 120px;
                height: 120px;
            }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.2);
            background: var(--bg-secondary);
            padding: 10px;
            transition: var(--transition);
        }

        .login-logo:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(220, 20, 60, 0.3);
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .login-logo i {
            font-size: 3rem;
            color: var(--accent);
            display: none;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 20, 60, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .register-link p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .register-link a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid transparent;
            display: none;
        }

        .alert-error {
            background: #fee;
            border-color: #fcc;
            color: #c33;
        }

        .alert-success {
            background: #efe;
            border-color: #cfc;
            color: #3c3;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-bottom: 2rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link a:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 1rem;
                padding: 2rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i>
                Voltar para Início
            </a>
        </div>

        <div class="login-header">
            <div class="login-logo">
                <img src="logo-gurgel.png" alt="GurgelTrack Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <i class="fas fa-dumbbell"></i>
            </div>
            <h1 class="login-title" id="formTitle">Login</h1>
            <p class="login-subtitle" id="formSubtitle">Acesse sua conta GurgelTrack</p>
        </div>

        <div class="alert alert-error" id="errorAlert">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage"></span>
        </div>

        <div class="alert alert-success" id="successAlert">
            <i class="fas fa-check-circle"></i>
            <span id="successMessage"></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="seu@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Senha
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit" class="login-btn" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Entrar</span>
            </button>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regEmail" class="form-label">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input 
                    type="email" 
                    id="regEmail" 
                    name="regEmail" 
                    class="form-input" 
                    placeholder="seu@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="regPassword" class="form-label">
                    <i class="fas fa-lock"></i> Senha
                </label>
                <input 
                    type="password" 
                    id="regPassword" 
                    name="regPassword" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">
                    <i class="fas fa-lock"></i> Confirmar Senha
                </label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit" class="login-btn" id="registerBtn">
                <i class="fas fa-user-plus"></i>
                <span id="regBtnText">Cadastrar</span>
            </button>
        </form>

        <div class="register-link">
            <p id="toggleText">Não tem uma conta?</p>
            <a href="#" id="toggleLink" onclick="toggleForm()">Criar conta</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Form elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const registerBtn = document.getElementById('registerBtn');
        const btnText = document.getElementById('btnText');
        const regBtnText = document.getElementById('regBtnText');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        
        // Toggle elements
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');
        
        let isLoginMode = true;

        // Toggle between login and register
        function toggleForm() {
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                // Show login form
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                formTitle.textContent = 'Login';
                formSubtitle.textContent = 'Acesse sua conta GurgelTrack';
                toggleText.textContent = 'Não tem uma conta?';
                toggleLink.textContent = 'Criar conta';
            } else {
                // Show register form
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                formTitle.textContent = 'Criar Conta';
                formSubtitle.textContent = 'Cadastre-se no GurgelTrack';
                toggleText.textContent = 'Já tem uma conta?';
                toggleLink.textContent = 'Fazer login';
            }
            
            // Clear alerts
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
        }

        // Função para mostrar alertas
        function showAlert(type, message) {
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            if (type === 'error') {
                errorMessage.textContent = message;
                errorAlert.style.display = 'block';
            } else if (type === 'success') {
                successMessage.textContent = message;
                successAlert.style.display = 'block';
            }
            
            // Auto esconder após 5 segundos
            setTimeout(() => {
                errorAlert.style.display = 'none';
                successAlert.style.display = 'none';
            }, 5000);
        }

        // Função para mostrar loading
        function setLoading(isLoading, isRegister = false) {
            const button = isRegister ? registerBtn : submitBtn;
            const text = isRegister ? regBtnText : btnText;
            
            if (isLoading) {
                button.disabled = true;
                text.textContent = isRegister ? 'Cadastrando...' : 'Conectando...';
                if (loading) loading.style.display = 'block';
            } else {
                button.disabled = false;
                text.textContent = isRegister ? 'Cadastrar' : 'Entrar';
                if (loading) loading.style.display = 'none';
            }
        }

        // Função de login
        async function handleLogin(email, password) {
            try {
                const data = await auth.login(email, password);
                
                // Login sucesso
                showAlert('success', 'Login realizado com sucesso!');
                
                // Redirecionar após 1 segundo
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Erro no login:', error);
                showAlert('error', error.message || 'Erro ao fazer login. Tente novamente.');
            } finally {
                setLoading(false);
            }
        }

        // Função de registro
        async function handleRegister(email, password) {
            try {
                const response = await fetch('/api/pessoas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro no cadastro');
                }

                // Registro sucesso
                showAlert('success', 'Conta criada com sucesso! Faça login para continuar.');
                
                // Limpar formulário
                registerForm.reset();
                
                // Mudar para modo login após 2 segundos
                setTimeout(() => {
                    toggleForm();
                }, 2000);

            } catch (error) {
                console.error('Erro no registro:', error);
                showAlert('error', error.message || 'Erro ao criar conta. Tente novamente.');
            } finally {
                setLoading(false, true);
            }
        }

        // Event listener do formulário de login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('error', 'Preencha todos os campos');
                return;
            }

            if (password.length < 6) {
                showAlert('error', 'A senha deve ter pelo menos 6 caracteres');
                return;
            }

            setLoading(true);
            await handleLogin(email, password);
        });

        // Event listener do formulário de registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !password || !confirmPassword) {
                showAlert('error', 'Preencha todos os campos');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('error', 'As senhas não coincidem');
                return;
            }

            if (password.length < 6) {
                showAlert('error', 'A senha deve ter pelo menos 6 caracteres');
                return;
            }

            setLoading(true, true);
            await handleRegister(email, password);
        });

        // Verificar se já está logado
        if (auth.isAuthenticated()) {
            showAlert('success', 'Você já está logado! Redirecionando...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Limpar alerts ao digitar
        ['email', 'password'].forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', () => {
                    errorAlert.style.display = 'none';
                    successAlert.style.display = 'none';
                });
            }
        });

        ['regEmail', 'regPassword', 'confirmPassword'].forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', () => {
                    errorAlert.style.display = 'none';
                    successAlert.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
