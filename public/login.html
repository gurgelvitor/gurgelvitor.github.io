<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GurgelTrack</title>
    <link rel="icon" type="image/png" sizes="32x32" href="logo-gurgel.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo-gurgel.png">
    <link rel="shortcut icon" href="logo-gurgel.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Cores do Tema Claro - Vermelho */
            --bg-primary: #ffffff;
            --bg-secondary: #ffffff;
            --accent: #dc143c;
            --accent-hover: #b91c1c;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border: #ffcccc;
            --shadow: 0 4px 12px rgba(220, 20, 60, 0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #dc143c;
            
            /* Sistema de Ícones - Tamanhos Padronizados */
            --icon-xs: 12px;
            --icon-sm: 16px;
            --icon-md: 20px;
            --icon-lg: 24px;
            --icon-xl: 32px;
            
            /* Cores de Ícones - Modo Claro */
            --icon-primary: var(--text-primary);
            --icon-secondary: var(--text-secondary);
            --icon-accent: var(--accent);
            --icon-white: #ffffff;
            --icon-light: #f8f9fa;
        }

        body.dark-mode {
            /* Cores do Tema Escuro - Mesmas do modo claro */
            --bg-primary: #0f0f0f;
            --bg-secondary: #1e1e1e;
            --accent: #dc143c;
            --accent-hover: #b91c1c;
            --text-primary: #f5f5f5;
            --text-secondary: #b8b8b8;
            --border: #333333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
            --danger-color: #dc143c;
            
            /* Cores de Ícones - Modo Escuro */
            --icon-primary: var(--text-primary);
            --icon-secondary: var(--text-secondary);
            --icon-accent: var(--accent);
            --icon-white: #ffffff;
            --icon-light: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .login-container {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 450px;
            position: relative;
            overflow: hidden;
            margin: 0;
        }

        /* Layout Responsivo */
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            
            .login-container {
                padding: 2rem;
                max-width: 100%;
                margin: 0;
            }
            
            .login-logo {
                width: 100px;
                height: 100px;
                margin: 0 auto 1rem;
            }
            
            .login-title {
                font-size: 1.75rem;
            }
            
            .login-subtitle {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.25rem;
            }
            
            .login-container {
                padding: 1.5rem;
                margin: 0;
                border-radius: 15px;
            }
            
            .login-logo {
                width: 80px;
                height: 80px;
                margin: 0 auto 1rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
            
            .login-subtitle {
                font-size: 0.85rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
            
            .form-input {
                padding: 0.75rem;
                font-size: 0.9rem;
            }
            
            .login-btn {
                padding: 0.75rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 1rem;
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            .login-logo {
                width: 70px;
                height: 70px;
            }
            
            .login-title {
                font-size: 1.25rem;
            }
            
            .login-subtitle {
                font-size: 0.8rem;
            }
        }

        /* Tablets e telas médias */
        @media (min-width: 769px) and (max-width: 1024px) {
            .login-container {
                max-width: 500px;
                padding: 2.5rem;
            }
            
            .login-logo {
                width: 110px;
                height: 110px;
            }
        }

        /* Telas grandes */
        @media (min-width: 1025px) {
            .login-container {
                max-width: 450px;
                padding: 3rem;
            }
            
            .login-logo {
                width: 120px;
                height: 120px;
            }
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.2);
            background: var(--bg-secondary);
            padding: 10px;
            transition: var(--transition);
        }

        .login-logo:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(220, 20, 60, 0.3);
        }

        .login-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 8px;
        }

        .login-logo i {
            font-size: 3rem;
            color: var(--accent);
            display: none;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin: 0;
        }

        /* Sistema de Formulários Moderno */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-control,
        .form-input {
            width: 100%;
            height: 48px;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .form-control:focus,
        .form-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-control::placeholder,
        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        textarea.form-control,
        textarea.form-input {
            height: auto;
            min-height: 120px;
            resize: vertical;
        }

        select.form-control,
        select.form-input {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6,9 12,15 18,9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .form-error {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 0.25rem;
            display: none;
        }

        .form-control.error,
        .form-input.error {
            border-color: #e74c3c;
        }

        .form-control.error + .form-error,
        .form-input.error + .form-error {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(220, 20, 60, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 20, 60, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Sistema de Botões Moderno */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 20, 60, 0.3);
            background: linear-gradient(135deg, #e74c3c, #c0392b, #a93226);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .btn-secondary:hover {
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 20, 60, 0.2);
        }

        /* Tamanhos de Botões */
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            height: 32px;
        }

        .btn-medium {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            height: 40px;
        }

        .btn-large {
            padding: 1rem 2rem;
            font-size: 1rem;
            height: 48px;
        }

        /* Combinações de Tamanho e Tipo */
        .btn-primary.btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            height: 32px;
        }

        .btn-primary.btn-medium {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            height: 40px;
        }

        .btn-primary.btn-large {
            padding: 1rem 2rem;
            font-size: 1rem;
            height: 48px;
        }

        .btn-secondary.btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            height: 32px;
        }

        .btn-secondary.btn-medium {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            height: 40px;
        }

        .btn-secondary.btn-large {
            padding: 1rem 2rem;
            font-size: 1rem;
            height: 48px;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .register-link p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .register-link a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid transparent;
            display: none;
        }

        .alert-error {
            background: #fee;
            border-color: #fcc;
            color: #c33;
        }

        .alert-success {
            background: #efe;
            border-color: #cfc;
            color: #3c3;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
            margin-bottom: 2rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link a:hover {
            color: var(--accent);
        }

        @media (max-width: 480px) {
            .login-container {
                margin: 1rem;
                padding: 2rem;
            }
            
            .login-title {
                font-size: 1.5rem;
            }
        }

        /* Tipografia Aprimorada - Hierarquia Visual */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
            margin-bottom: 1.5rem;
            letter-spacing: -0.03em;
        }

        h2 {
            font-size: 2.25rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 1.25rem;
            letter-spacing: -0.02em;
        }

        h3 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
        }

        h4 {
            font-size: 1.375rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
            margin-bottom: 0.875rem;
        }

        h5 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        h6 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 0.625rem;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        /* Textos longos com melhor legibilidade */
        .long-text, .description-text, .content-text {
            line-height: 1.6;
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .subtitle-text {
            font-size: 1.125rem;
            line-height: 1.6;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Contraste para elementos importantes */
        .text-primary {
            color: var(--text-primary);
            font-weight: 500;
        }

        .text-secondary {
            color: var(--text-secondary);
        }

        .text-accent {
            color: var(--accent);
            font-weight: 600;
        }

        /* Sistema de Espaçamento Consistente */
        .section-spacing {
            margin-bottom: 60px;
        }

        .element-spacing {
            margin-bottom: 24px;
        }

        .group-spacing {
            margin-bottom: 16px;
        }

        .small-spacing {
            margin-bottom: 12px;
        }

        /* Cards com hierarquia visual */
        .card-primary {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        /* Sistema de Grid - 12 Colunas */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .grid-container-sm {
            gap: 20px;
        }

        .grid-container-lg {
            gap: 30px;
        }

        /* Classes de Colunas (1-12) */
        .col-1 { grid-column: span 1; }
        .col-2 { grid-column: span 2; }
        .col-3 { grid-column: span 3; }
        .col-4 { grid-column: span 4; }
        .col-5 { grid-column: span 5; }
        .col-6 { grid-column: span 6; }
        .col-7 { grid-column: span 7; }
        .col-8 { grid-column: span 8; }
        .col-9 { grid-column: span 9; }
        .col-10 { grid-column: span 10; }
        .col-11 { grid-column: span 11; }
        .col-12 { grid-column: span 12; }

        /* Classes de Offset */
        .offset-1 { margin-left: calc(1 * 8.333333% + 12px); }
        .offset-2 { margin-left: calc(2 * 8.333333% + 24px); }
        .offset-3 { margin-left: calc(3 * 8.333333% + 36px); }
        .offset-4 { margin-left: calc(4 * 8.333333% + 48px); }
        .offset-5 { margin-left: calc(5 * 8.333333% + 60px); }
        .offset-6 { margin-left: calc(6 * 8.333333% + 72px); }

        /* Alinhamento Visual Consistente */
        .grid-center {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
            align-items: center;
            justify-items: center;
        }

        .grid-start {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
            align-items: start;
            justify-items: start;
        }

        .grid-end {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 24px;
            align-items: end;
            justify-items: end;
        }

        /* Grid Responsivo */
        @media (max-width: 768px) {
            .grid-container,
            .grid-center,
            .grid-start,
            .grid-end {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .col-1, .col-2, .col-3, .col-4, .col-5, .col-6,
            .col-7, .col-8, .col-9, .col-10, .col-11, .col-12 {
                grid-column: span 1;
            }

            .offset-1, .offset-2, .offset-3, .offset-4, .offset-5, .offset-6 {
                margin-left: 0;
            }
        }

        @media (max-width: 480px) {
            .grid-container,
            .grid-center,
            .grid-start,
            .grid-end {
                gap: 16px;
            }
        }

        /* Sistema de Micro-Interações Modernas */
        
        /* Hover States para Cards */
        .card,
        .workout-section,
        .content-section,
        .help-section {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover,
        .workout-section:hover,
        .content-section:hover,
        .help-section:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        /* Hover States para Navegação */
        .nav-item {
            position: relative;
            transform: translateX(0);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover {
            transform: translateX(4px);
            background: rgba(52, 152, 219, 0.1);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-item:hover::after {
            width: 100%;
        }

        /* Hover States para Links */
        a {
            position: relative;
            color: var(--accent);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        a:hover {
            color: #2980b9;
        }

        a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        a:hover::after {
            width: 100%;
        }

        /* Loading Spinners */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(52, 152, 219, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s ease-in-out infinite;
        }

        .spinner-large {
            width: 40px;
            height: 40px;
            border-width: 4px;
        }

        .spinner-small {
            width: 16px;
            height: 16px;
            border-width: 2px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Loading States para Botões */
        .btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn.loading .btn-text {
            opacity: 0;
        }

        .btn.loading .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 1;
        }

        .btn .spinner {
            opacity: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Pulse Animation para elementos importantes */
        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.7);
            }
            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 10px rgba(52, 152, 219, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(52, 152, 219, 0);
            }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        /* Slide In Animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .slide-in {
            animation: slideIn 0.5s ease-out;
        }

        /* Bounce Animation */
        @keyframes bounce {
            0%, 20%, 53%, 80%, 100% {
                transform: translateY(0);
            }
            40%, 43% {
                transform: translateY(-10px);
            }
            70% {
                transform: translateY(-5px);
            }
            90% {
                transform: translateY(-2px);
            }
        }

        .bounce {
            animation: bounce 1s ease-in-out;
        }

        /* Hover States para Imagens */
        img {
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        /* Hover States para Ícones */
        .fas,
        .fab,
        .far {
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .fas:hover,
        .fab:hover,
        .far:hover {
            transform: scale(1.2) rotate(5deg);
            color: var(--accent);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-overlay .spinner-large {
            border-color: rgba(255, 255, 255, 0.3);
            border-top-color: white;
        }

        /* Progress Bar Animation */
        @keyframes progress {
            from {
                width: 0%;
            }
        }

        .progress-bar {
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
            animation: progress 2s ease-out;
        }

        /* Tooltip Animation */
        .tooltip {
            position: relative;
        }

        .tooltip::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #333;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 1000;
        }

        .tooltip::after {
            content: '';
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            border: 5px solid transparent;
            border-top-color: #333;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .tooltip:hover::before,
        .tooltip:hover::after {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        /* Sistema de Ícones com Contraste Adequado */
        
        /* Classes Base para Ícones */
        .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        
        /* Tamanhos Padronizados de Ícones */
        .icon-xs {
            font-size: var(--icon-xs);
            width: var(--icon-xs);
            height: var(--icon-xs);
        }
        
        .icon-sm {
            font-size: var(--icon-sm);
            width: var(--icon-sm);
            height: var(--icon-sm);
        }
        
        .icon-md {
            font-size: var(--icon-md);
            width: var(--icon-md);
            height: var(--icon-md);
        }
        
        .icon-lg {
            font-size: var(--icon-lg);
            width: var(--icon-lg);
            height: var(--icon-lg);
        }
        
        .icon-xl {
            font-size: var(--icon-xl);
            width: var(--icon-xl);
            height: var(--icon-xl);
        }
        
        /* Cores de Ícones - Herdam do Texto */
        .icon-primary {
            color: var(--icon-primary);
        }
        
        .icon-secondary {
            color: var(--icon-secondary);
        }
        
        .icon-accent {
            color: var(--icon-accent);
        }
        
        .icon-white {
            color: var(--icon-white);
        }
        
        .icon-light {
            color: var(--icon-light);
        }
        
        /* Ícones em Botões com Fundo Colorido */
        .btn .icon,
        .sidebar-personal-btn .icon,
        .theme-toggle .icon,
        .help-button .icon {
            color: var(--icon-white);
        }
        
        /* Ícones em Navegação Sidebar */
        .nav-item .icon {
            color: var(--icon-primary);
            transition: var(--transition);
        }
        
        .nav-item:hover .icon {
            color: var(--icon-accent);
        }
        
        .nav-item.active .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Cabeçalhos e Títulos */
        .selector-title .icon,
        .section-title .icon,
        .header-icon .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Cards e Seções */
        .card .icon,
        .workout-section .icon,
        .content-section .icon,
        .load-section .icon {
            color: var(--icon-primary);
        }
        
        .card:hover .icon,
        .workout-section:hover .icon,
        .content-section:hover .icon,
        .load-section:hover .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Formulários */
        .form-group .icon {
            color: var(--icon-secondary);
        }
        
        .form-group:focus-within .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Tabelas */
        .table .icon {
            color: var(--icon-primary);
        }
        
        .table th .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Abas */
        .day-tab .icon {
            color: var(--icon-primary);
            transition: var(--transition);
        }
        
        .day-tab:hover .icon,
        .day-tab.active .icon {
            color: var(--icon-white);
        }
        
        /* Ícones em Accordion */
        .week-header .icon {
            color: var(--icon-primary);
            transition: var(--transition);
        }
        
        .week-header:hover .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Ações */
        .exercise-actions .icon,
        .week-actions .icon {
            color: var(--icon-white);
        }
        
        /* Ícones em Botões de Ação Específicos */
        .btn-success .icon {
            color: var(--icon-white);
        }
        
        .btn-edit .icon {
            color: var(--icon-white);
        }
        
        .btn-delete .icon {
            color: var(--icon-white);
        }
        
        .btn-icon.delete .icon {
            color: var(--icon-white);
        }
        
        /* Ícones em Modal de Ajuda */
        .help-modal-title .icon {
            color: var(--icon-accent);
        }
        
        .help-section-title .icon {
            color: var(--icon-accent);
        }
        
        .help-step-number {
            background: var(--icon-accent);
            color: var(--icon-white);
        }
        
        /* Ícones em Estados Especiais */
        .empty-state .icon {
            color: var(--icon-secondary);
            font-size: var(--icon-xl);
        }
        
        /* Ícones em Loading States */
        .spinner .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones em Tooltips */
        .tooltip .icon {
            color: var(--icon-secondary);
        }
        
        .tooltip:hover .icon {
            color: var(--icon-accent);
        }
        
        /* Ícones Responsivos */
        @media (max-width: 768px) {
            .icon-xl {
                font-size: var(--icon-lg);
                width: var(--icon-lg);
                height: var(--icon-lg);
            }
            
            .icon-lg {
                font-size: var(--icon-md);
                width: var(--icon-md);
                height: var(--icon-md);
            }
        }
        
        @media (max-width: 480px) {
            .icon-xl,
            .icon-lg {
                font-size: var(--icon-sm);
                width: var(--icon-sm);
                height: var(--icon-sm);
            }
        }

        /* Animações Principais - Fade In, Slide Up, Scale */
        
        /* Fade In Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        /* Slide Up Animation */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide-up {
            animation: slideUp 0.6s ease-out;
        }
        
        /* Scale Animation */
        @keyframes scale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .scale {
            animation: scale 0.4s ease-out;
        }
        
        /* Animações combinadas para elementos específicos */
        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in-slide-up {
            animation: fadeInSlideUp 0.8s ease-out;
        }
        
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .fade-in-scale {
            animation: fadeInScale 0.5s ease-out;
        }
        
        /* Aplicar animações a elementos principais */
        .card,
        .workout-section,
        .content-section,
        .help-section {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInSlideUp 0.8s ease-out forwards;
        }
        
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        
        .btn-primary,
        .btn-secondary,
        .btn-success {
            opacity: 0;
            transform: scale(0.95);
            animation: fadeInScale 0.5s ease-out forwards;
        }
        
        .btn-primary { animation-delay: 0.3s; }
        .btn-secondary { animation-delay: 0.4s; }
        .btn-success { animation-delay: 0.5s; }
        
        /* Animações para formulários */
        .form-group {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInSlideUp 0.6s ease-out forwards;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        
        /* Animações para tabelas */
        .table {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInSlideUp 0.8s ease-out forwards;
        }
        
        /* Animações para navegação */
        .nav-item {
            opacity: 0;
            transform: translateX(-20px);
            animation: slideIn 0.6s ease-out forwards;
        }
        
        .nav-item:nth-child(1) { animation-delay: 0.1s; }
        .nav-item:nth-child(2) { animation-delay: 0.2s; }
        .nav-item:nth-child(3) { animation-delay: 0.3s; }
        .nav-item:nth-child(4) { animation-delay: 0.4s; }
        .nav-item:nth-child(5) { animation-delay: 0.5s; }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        /* Animações para headers e títulos */
        h1, h2, h3, .section-title {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInSlideUp 0.6s ease-out forwards;
        }
        
        h1 { animation-delay: 0.1s; }
        h2 { animation-delay: 0.2s; }
        h3 { animation-delay: 0.3s; }
        .section-title { animation-delay: 0.2s; }
        
        /* Animações específicas para página de login */
        .login-container {
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            animation: fadeInScale 0.8s ease-out forwards;
        }
        
        .login-header {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInSlideUp 0.6s ease-out forwards;
            animation-delay: 0.2s;
        }
        
        .form-group {
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInSlideUp 0.6s ease-out forwards;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.4s; }
        .form-group:nth-child(2) { animation-delay: 0.5s; }
        
        .btn-primary {
            opacity: 0;
            transform: scale(0.95);
            animation: fadeInScale 0.5s ease-out forwards;
            animation-delay: 0.6s;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i>
                Voltar para Início
            </a>
        </div>

        <div class="login-header">
            <div class="login-logo">
                <img src="logo-gurgel.png" alt="GurgelTrack Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <i class="fas fa-dumbbell"></i>
            </div>
            <h1 class="login-title" id="formTitle">Login</h1>
            <p class="login-subtitle" id="formSubtitle">Acesse sua conta GurgelTrack</p>
        </div>

        <div class="alert alert-error" id="errorAlert">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorMessage"></span>
        </div>

        <div class="alert alert-success" id="successAlert">
            <i class="fas fa-check-circle"></i>
            <span id="successMessage"></span>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    class="form-input" 
                    placeholder="seu@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Senha
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit" class="login-btn" id="submitBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Entrar</span>
            </button>
        </form>

        <!-- Register Form (Hidden by default) -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label for="regEmail" class="form-label">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input 
                    type="email" 
                    id="regEmail" 
                    name="regEmail" 
                    class="form-input" 
                    placeholder="seu@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="regPassword" class="form-label">
                    <i class="fas fa-lock"></i> Senha
                </label>
                <input 
                    type="password" 
                    id="regPassword" 
                    name="regPassword" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    minlength="6"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">
                    <i class="fas fa-lock"></i> Confirmar Senha
                </label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                    minlength="6"
                >
            </div>

            <button type="submit" class="login-btn" id="registerBtn">
                <i class="fas fa-user-plus"></i>
                <span id="regBtnText">Cadastrar</span>
            </button>
        </form>

        <div class="register-link">
            <p id="toggleText">Não tem uma conta?</p>
            <a href="#" id="toggleLink" onclick="toggleForm()">Criar conta</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Form elements
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const registerBtn = document.getElementById('registerBtn');
        const btnText = document.getElementById('btnText');
        const regBtnText = document.getElementById('regBtnText');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        
        // Toggle elements
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const toggleText = document.getElementById('toggleText');
        const toggleLink = document.getElementById('toggleLink');
        
        let isLoginMode = true;

        // Toggle between login and register
        function toggleForm() {
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                // Show login form
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                formTitle.textContent = 'Login';
                formSubtitle.textContent = 'Acesse sua conta GurgelTrack';
                toggleText.textContent = 'Não tem uma conta?';
                toggleLink.textContent = 'Criar conta';
            } else {
                // Show register form
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                formTitle.textContent = 'Criar Conta';
                formSubtitle.textContent = 'Cadastre-se no GurgelTrack';
                toggleText.textContent = 'Já tem uma conta?';
                toggleLink.textContent = 'Fazer login';
            }
            
            // Clear alerts
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
        }

        // Função para mostrar alertas
        function showAlert(type, message) {
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            if (type === 'error') {
                errorMessage.textContent = message;
                errorAlert.style.display = 'block';
            } else if (type === 'success') {
                successMessage.textContent = message;
                successAlert.style.display = 'block';
            }
            
            // Auto esconder após 5 segundos
            setTimeout(() => {
                errorAlert.style.display = 'none';
                successAlert.style.display = 'none';
            }, 5000);
        }

        // Função para mostrar loading
        function setLoading(isLoading, isRegister = false) {
            const button = isRegister ? registerBtn : submitBtn;
            const text = isRegister ? regBtnText : btnText;
            
            if (isLoading) {
                button.disabled = true;
                text.textContent = isRegister ? 'Cadastrando...' : 'Conectando...';
                if (loading) loading.style.display = 'block';
            } else {
                button.disabled = false;
                text.textContent = isRegister ? 'Cadastrar' : 'Entrar';
                if (loading) loading.style.display = 'none';
            }
        }

        // Função de login
        async function handleLogin(email, password) {
            try {
                const data = await auth.login(email, password);
                
                // Login sucesso
                showAlert('success', 'Login realizado com sucesso!');
                
                // Redirecionar após 1 segundo
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Erro no login:', error);
                showAlert('error', error.message || 'Erro ao fazer login. Tente novamente.');
            } finally {
                setLoading(false);
            }
        }

        // Função de registro
        async function handleRegister(email, password) {
            try {
                const response = await fetch('/api/pessoas', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro no cadastro');
                }

                // Registro sucesso
                showAlert('success', 'Conta criada com sucesso! Faça login para continuar.');
                
                // Limpar formulário
                registerForm.reset();
                
                // Mudar para modo login após 2 segundos
                setTimeout(() => {
                    toggleForm();
                }, 2000);

            } catch (error) {
                console.error('Erro no registro:', error);
                showAlert('error', error.message || 'Erro ao criar conta. Tente novamente.');
            } finally {
                setLoading(false, true);
            }
        }

        // Event listener do formulário de login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('error', 'Preencha todos os campos');
                return;
            }

            if (password.length < 6) {
                showAlert('error', 'A senha deve ter pelo menos 6 caracteres');
                return;
            }

            setLoading(true);
            await handleLogin(email, password);
        });

        // Event listener do formulário de registro
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!email || !password || !confirmPassword) {
                showAlert('error', 'Preencha todos os campos');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('error', 'As senhas não coincidem');
                return;
            }

            if (password.length < 6) {
                showAlert('error', 'A senha deve ter pelo menos 6 caracteres');
                return;
            }

            setLoading(true, true);
            await handleRegister(email, password);
        });

        // Verificar se já está logado
        if (auth.isAuthenticated()) {
            showAlert('success', 'Você já está logado! Redirecionando...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
        }

        // Limpar alerts ao digitar
        ['email', 'password'].forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', () => {
                    errorAlert.style.display = 'none';
                    successAlert.style.display = 'none';
                });
            }
        });

        ['regEmail', 'regPassword', 'confirmPassword'].forEach(id => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', () => {
                    errorAlert.style.display = 'none';
                    successAlert.style.display = 'none';
                });
            }
        });
    </script>
</body>
</html>
